<!DOCTYPE html>
<html>
<head>
    <title>Historical Model Accuracy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <!-- Navigation -->
    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Historical Model Accuracy</h1>

    <!-- Season Checkbox Selector -->
    <div id="seasonCheckboxes" style="margin-bottom: 20px;"></div>

    <!-- Loading indicator -->
    <div id="historyLoading" class="loading">
        <div class="loader-spinner"></div>
        <div>Loading historical accuracy...</div>
    </div>

    <!-- Season Accuracy Table -->
    <table id="accuracyTable" class="hidden">
        <thead>
            <tr>
                <th>Season</th>
                <th>Games</th>
                <th>Correct</th>
                <th>Accuracy</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Week-by-week line chart -->
    <div class="chart-container">
        <h2 style="text-align:center; margin-top:0; font-size:1.1rem;">Week-by-Week Accuracy</h2>
        <canvas id="weeklyAccuracyChart"></canvas>
    </div>

    <!-- Team accuracy chart -->
    <div class="chart-container">
        <h2 style="text-align:center; margin-top:0; font-size:1.1rem;">Model Accuracy by Team</h2>
        <canvas id="teamAccuracyChart"></canvas>
    </div>

</div>

<script>
/* ---------------- NFL TEAM COLORS ---------------- */
const TEAM_COLORS = {
    "ARI": "#97233F","ATL": "#A71930","BAL": "#241773","BUF": "#00338D",
    "CAR": "#0085CA","CHI": "#0B162A","CIN": "#FB4F14","CLE": "#311D00",
    "DAL": "#003594","DEN": "#FB4F14","DET": "#0076B6","GB": "#203731",
    "HOU": "#03202F","IND": "#002C5F","JAX": "#006778","KC": "#E31837",
    "LV": "#000000","LAC": "#0080C6","LAR": "#003594","MIA": "#008E97",
    "MIN": "#4F2683","NE": "#002244","NO": "#D3BC8D","NYG": "#0B2265",
    "NYJ": "#125740","PHI": "#004C54","PIT": "#FFB612","SF": "#AA0000",
    "SEA": "#002244","TB": "#D50A0A","TEN": "#4B92DB","WAS": "#5A1414"
};

/* ---------------- CSV Loader ---------------- */
async function loadCSV(path) {
    const res = await fetch(path);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

/* ---------------- Manifest Loader ---------------- */
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

function showHistoryLoading(show) {
    const loadingEl = document.getElementById("historyLoading");
    const tableEl = document.getElementById("accuracyTable");
    if (show) {
        loadingEl.classList.remove("hidden");
        tableEl.classList.add("hidden");
    } else {
        loadingEl.classList.add("hidden");
        tableEl.classList.remove("hidden");
    }
}

/* ---------------- Season Checkbox Builder ---------------- */
function buildSeasonCheckboxes(manifest) {
    const container = document.getElementById("seasonCheckboxes");
    container.innerHTML = "<strong>Select Seasons:</strong><br><br>";

    const seasonWeeks = {};
    manifest.predictions_csv.forEach(p => {
        const s = Number(p.season);
        const w = Number(p.week);
        if (!seasonWeeks[s]) seasonWeeks[s] = 0;
        seasonWeeks[s] = Math.max(seasonWeeks[s], w);
    });

    const validSeasons = Object.keys(seasonWeeks)
        .filter(s => seasonWeeks[s] > 1)
        .sort((a,b) => Number(a) - Number(b));

    validSeasons.forEach(season => {
        const id = `season_${season}`;
        container.innerHTML += `
            <label style="margin-right: 15px;">
                <input type="checkbox" id="${id}" value="${season}" checked>
                ${season}
            </label>
        `;
    });

    container.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", buildAccuracy);
    });
}

/* ---------------- Charts ---------------- */
let weeklyChart = null;
let teamChart = null;

/* ---------------- Build Accuracy ---------------- */
async function buildAccuracy() {
    showHistoryLoading(true);

    const manifest = await loadManifest();
    const history = await loadCSV("data/nfl_historical_matchup_data.csv");

    const predictions = [];

    for (const entry of manifest.predictions_csv) {
        const rows = await loadCSV(`data/${entry.file}`);
        rows.forEach(r => {
            r.season = Number(entry.season);
            r.week = Number(entry.week);

            if (r["Home Team"]) {
                r.team1 = r["Home Team"];
                r.team2 = r["Away Team"];
                r.predicted = r["Predicted Winner"];
            } else {
                r.team1 = r.team_abbr;
                r.team2 = r.opponent_abbr;
                r.predicted = r.predicted_winner;
            }
        });
        predictions.push(...rows);
    }

    const predIndex = {};
    predictions.forEach(p => {
        const key1 = `${p.season}-${p.week}-${p.team1}-${p.team2}`;
        const key2 = `${p.season}-${p.week}-${p.team2}-${p.team1}`;
        predIndex[key1] = p;
        predIndex[key2] = p;
    });

    const seasonWeeks = {};
    manifest.predictions_csv.forEach(p => {
        const s = Number(p.season);
        const w = Number(p.week);
        if (!seasonWeeks[s]) seasonWeeks[s] = 0;
        seasonWeeks[s] = Math.max(seasonWeeks[s], w);
    });

    const selectedSeasons = [...document.querySelectorAll("#seasonCheckboxes input:checked")].map(cb => Number(cb.value));

    const seasonTotals = {};
    const weeklyAccuracy = {};
    const teamStats = {};

    const games = {};
    history.forEach(h => {
        if (!games[h.game_id]) games[h.game_id] = [];
        games[h.game_id].push(h);
    });

    Object.values(games).forEach(rows => {
        const h = rows[0];
        const season = Number(h.season);
        const week = Number(h.week);

        if (!selectedSeasons.includes(season)) return;

        const latestWeek = seasonWeeks[season];
        if (week >= latestWeek) return;

        const winnerRow = rows.find(r => r.win === "True");
        const loserRow = rows.find(r => r.win === "False");
        if (!winnerRow || !loserRow) return;

        const actualWinner = winnerRow.team_abbr;

        const key = `${season}-${week}-${winnerRow.team_abbr}-${loserRow.team_abbr}`;
        const pred = predIndex[key];

        if (!seasonTotals[season]) seasonTotals[season] = {games: 0, correct: 0};
        seasonTotals[season].games++;

        const isCorrect = pred && pred.predicted === actualWinner;
        if (isCorrect) seasonTotals[season].correct++;

        if (!weeklyAccuracy[season]) weeklyAccuracy[season] = {};
        if (!weeklyAccuracy[season][week]) weeklyAccuracy[season][week] = {games: 0, correct: 0};
        weeklyAccuracy[season][week].games++;
        if (isCorrect) weeklyAccuracy[season][week].correct++;

        rows.forEach(r => {
            const team = r.team_abbr;
            if (!teamStats[team]) teamStats[team] = {games: 0, correct: 0};
            teamStats[team].games++;
            if (isCorrect) teamStats[team].correct++;
        });
    });

    /* -------- Render Season Table -------- */
    const tbody = document.querySelector("#accuracyTable tbody");
    tbody.innerHTML = "";

    Object.entries(seasonTotals).forEach(([season, stats]) => {
        const acc = (stats.correct / stats.games * 100).toFixed(1) + "%";
        tbody.innerHTML += `
            <tr>
                <td>${season}</td>
                <td>${stats.games}</td>
                <td>${stats.correct}</td>
                <td>${acc}</td>
            </tr>
        `;
    });

    /* -------- Render Weekly Line Chart -------- */
    const allWeeks = [...new Set(
        Object.values(weeklyAccuracy)
            .flatMap(seasonData => Object.keys(seasonData).map(Number))
    )].sort((a,b) => a - b);

    const datasets = Object.keys(weeklyAccuracy).map((season, idx) => {
        const colorList = ["#4da3ff", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd"];
        const color = colorList[idx % colorList.length];

        return {
            label: season,
            data: allWeeks.map(w => {
                const stats = weeklyAccuracy[season][w];
                return stats ? (stats.correct / stats.games * 100).toFixed(1) : null;
            }),
            borderColor: color,
            backgroundColor: color + "33",
            borderWidth: 2,
            spanGaps: true,
            tension: 0.2
        };
    });

    const ctx1 = document.getElementById("weeklyAccuracyChart").getContext("2d");
    if (weeklyChart) weeklyChart.destroy();

    weeklyChart = new Chart(ctx1, {
        type: 'line',
        data: {
            labels: allWeeks.map(w => `Week ${w}`),
            datasets: datasets
        },
        options: {
            scales: {
                y: { beginAtZero: true, max: 100 }
            }
        }
    });

    /* -------- Render Team Accuracy Bar Chart -------- */
    const teamLabels = [];
    const teamAcc = [];
    const teamColors = [];

    Object.entries(teamStats).forEach(([team, stats]) => {
        if (stats.games > 0) {
            teamLabels.push(team);
            teamAcc.push((stats.correct / stats.games * 100).toFixed(1));
            teamColors.push(TEAM_COLORS[team] || "#888");
        }
    });

    const ctx2 = document.getElementById("teamAccuracyChart").getContext("2d");
    if (teamChart) teamChart.destroy();

    teamChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: teamLabels,
            datasets: [{
                label: "Accuracy (%)",
                data: teamAcc,
                backgroundColor: teamColors,
                borderColor: "#ffffff",
                borderWidth: 2
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true, max: 100 }
            }
        }
    });

    showHistoryLoading(false);
}

/* ---------------- Init ---------------- */
async function init() {
    const manifest = await loadManifest();
    buildSeasonCheckboxes(manifest);
    await buildAccuracy();
}

init();
</script>

</body>
</html>
