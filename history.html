<!DOCTYPE html>
<html>
<head>
    <title>Historical Model Accuracy</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .chart-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto 30px auto;
        }

        .summary-box {
            background: #1f2933;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #3b4a5a;
        }

        .summary-item {
            margin-bottom: 8px;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        #seasonSelect {
            min-width: 160px;
            height: 90px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Historical Model Accuracy</h1>

    <div style="text-align:center; margin-bottom:20px;">
        <label for="seasonSelect" style="font-weight:bold;">Select Season(s):</label>
        <select id="seasonSelect" multiple style="margin-left:10px;"></select>
        <div style="font-size:0.8rem; color:#9ca3af; margin-top:6px;">
            Hold Ctrl (Cmd on Mac) to select multiple seasons.
        </div>
    </div>

    <div id="historyLoading" class="loading hidden">
        <div class="loader-spinner"></div>
        <div>Loading historical data...</div>
    </div>

    <div id="summaryBox" class="summary-box hidden"></div>

    <div class="chart-container">
        <h2 style="text-align:center; margin-bottom:10px;">Historical Accuracy by Week</h2>
        <canvas id="weeklyChart"></canvas>
    </div>

    <div class="chart-container">
        <h2 style="text-align:center; margin-bottom:10px;">Historical Accuracy by Team</h2>
        <canvas id="teamChart"></canvas>
    </div>

</div>

<script>
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

async function loadHistoricalCSV() {
    const res = await fetch("data/nfl_historical_matchup_data.csv");
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

function showHistoryLoading(show) {
    const el = document.getElementById("historyLoading");
    if (show) el.classList.remove("hidden");
    else el.classList.add("hidden");
}

/* ---------- TEAM COLORS ---------- */
const TEAM_COLORS = {
    "ARI": "#97233F","ATL": "#A71930","BAL": "#241773","BUF": "#00338D",
    "CAR": "#0085CA","CHI": "#0B162A","CIN": "#FB4F14","CLE": "#311D00",
    "DAL": "#003594","DEN": "#FB4F14","DET": "#0076B6","GB":  "#203731",
    "HOU": "#03202F","IND": "#002C5F","JAX": "#006778","KC":  "#E31837",
    "LV":  "#000000","LAC": "#0080C6","LAR": "#003594","MIA": "#008E97",
    "MIN": "#4F2683","NE":  "#002244","NO":  "#D3BC8D","NYG": "#0B2265",
    "NYJ": "#125740","PHI": "#004C54","PIT": "#FFB612","SF":  "#AA0000",
    "SEA": "#002244","TB":  "#D50A0A","TEN": "#4B92DB","WAS": "#5A1414"
};

/* ---------- LATEST PREDICTION ENTRY (POSTSEASON-AWARE) ---------- */
function getLatestPredictionEntry(manifest) {
    return manifest.predictions_csv.reduce((a,b) => {
        if (Number(a.season) !== Number(b.season)) {
            return Number(a.season) > Number(b.season) ? a : b;
        }
        if (Number(a.postseason_ind) !== Number(b.postseason_ind)) {
            return Number(a.postseason_ind) > Number(b.postseason_ind) ? a : b;
        }
        return Number(a.week) > Number(b.week) ? a : b;
    });
}

/* ---------- FILTER HISTORICAL TO GAMES WITH PREDICTIONS (EXCLUDING LATEST WEEK) ---------- */
function filterHistoricalWithPredictions(historical, manifest) {
    const latest = getLatestPredictionEntry(manifest);
    const latestKey = `${latest.season}-${latest.week}-${latest.postseason_ind}`;

    const predictionIndex = new Set(
        manifest.predictions_csv
            .filter(p => `${p.season}-${p.week}-${p.postseason_ind}` !== latestKey)
            .map(p => `${p.season}-${p.week}-${p.postseason_ind}`)
    );

    return historical.filter(h => {
        const key = `${h.season}-${h.week}-${h.postseason_ind}`;
        return predictionIndex.has(key);
    });
}

/* ---------- DEDUPE TO GAME-LEVEL (USING game_id) ---------- */
function dedupeGamesToGameLevel(rows) {
    const gameMap = {};

    rows.forEach(r => {
        const game_id = r.game_id;
        const season = Number(r.season);
        const week = Number(r.week);
        const postseason_ind = Number(r.postseason_ind || 0);
        const team_abbr = r.team_abbr;
        const opponent_abbr = r.opponent_abbr;
        const win = String(r.win).toLowerCase() === "true";

        if (!gameMap[game_id]) {
            gameMap[game_id] = {
                game_id,
                season,
                week,
                postseason_ind,
                team_abbr,
                opponent_abbr,
                any_correct: win,
                total_rows: 1
            };
        } else {
            gameMap[game_id].any_correct = gameMap[game_id].any_correct || win;
            gameMap[game_id].total_rows += 1;
        }
    });

    return Object.values(gameMap);
}

/* ---------- POPULATE SEASON DROPDOWN (ONLY SEASONS WITH COMPLETED GAMES) ---------- */
function populateSeasonDropdownFromGames(games) {
    const seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = "";

    const seasons = [...new Set(games.map(g => Number(g.season)))].sort((a,b) => a - b);

    seasons.forEach(season => {
        const opt = document.createElement("option");
        opt.value = season;
        opt.textContent = season;
        seasonSelect.appendChild(opt);
    });

    if (seasons.length > 0) {
        seasonSelect.value = seasons[seasons.length - 1];
    }
}

/* ---------- SUMMARY BOX (USING GAME-LEVEL ACCURACY) ---------- */
function renderSummaryBox(gameLevel, selectedSeasons) {
    const box = document.getElementById("summaryBox");

    const filtered = gameLevel.filter(g => selectedSeasons.includes(Number(g.season)));

    if (filtered.length === 0) {
        box.classList.remove("hidden");
        box.innerHTML = "<h2>No completed games with predictions for the selected season(s).</h2>";
        return;
    }

    let correct = 0;
    let total = filtered.length;

    filtered.forEach(g => {
        if (g.any_correct) correct++;
    });

    const pct = total > 0 ? (correct / total * 100).toFixed(1) : "0.0";

    box.classList.remove("hidden");
    box.innerHTML = `
        <h2>Historical Summary</h2>
        <div class="summary-item"><strong>Selected Seasons:</strong> ${selectedSeasons.join(", ")}</div>
        <div class="summary-item"><strong>Total Games with Predictions:</strong> ${total}</div>
        <div class="summary-item"><strong>Overall Accuracy:</strong> ${pct}%</div>
        <div class="summary-item"><em>Includes only games where predictions exist and excludes the latest prediction week.</em></div>
    `;
}

/* ---------- WEEKLY ACCURACY (GAME-LEVEL, POSTSEASON-AWARE) ---------- */
function computeWeeklyAccuracyBySeason(gameLevel, selectedSeasons) {
    const result = {}; // season -> key -> {correct,total}
    selectedSeasons.forEach(s => result[s] = {});

    gameLevel.forEach(g => {
        const season = Number(g.season);
        if (!selectedSeasons.includes(season)) return;

        const week = Number(g.week);
        const ps = Number(g.postseason_ind || 0);
        const key = `${ps}-${week}`;

        if (!result[season][key]) {
            result[season][key] = {correct:0, total:0};
        }

        result[season][key].total++;
        if (g.any_correct) {
            result[season][key].correct++;
        }
    });

    return result;
}

/* ---------- TEAM ACCURACY (PER-TEAM ROWS USING win) ---------- */
function computeTeamAccuracy(rows, selectedSeasons) {
    const teamStats = {};

    rows.forEach(r => {
        const season = Number(r.season);
        if (!selectedSeasons.includes(season)) return;

        const team = r.team_abbr;
        const win = String(r.win).toLowerCase() === "true";

        if (!teamStats[team]) teamStats[team] = {correct:0, total:0};
        teamStats[team].total++;
        if (win) teamStats[team].correct++;
    });

    return teamStats;
}

/* ---------- CHARTS ---------- */
let weeklyChart = null;
let teamChart = null;

function renderWeeklyChartFromData(weeklyBySeason) {
    const ctx = document.getElementById("weeklyChart").getContext("2d");

    const allKeysSet = new Set();
    Object.values(weeklyBySeason).forEach(weekMap => {
        Object.keys(weekMap).forEach(k => allKeysSet.add(k));
    });

    const allKeys = Array.from(allKeysSet).map(k => {
        const [ps, w] = k.split("-").map(Number);
        return {ps, w, key: k};
    }).sort((a,b) => {
        if (a.ps !== b.ps) return a.ps - b.ps;   // regular first, postseason after
        return a.w - b.w;
    });

    const labels = allKeys.map(k =>
        k.ps === 1 ? `Postseason Week ${k.w}` : `Week ${k.w}`
    );

    const seasonIds = Object.keys(weeklyBySeason).map(Number).sort((a,b) => a - b);

    const palette = [
        "#4da3ff","#34d399","#f97316","#e11d48",
        "#a855f7","#22c55e","#facc15","#0ea5e9"
    ];

    const datasets = seasonIds.map((season, idx) => {
        const weekMap = weeklyBySeason[season];
        const data = allKeys.map(k => {
            const rec = weekMap[k.key];
            if (!rec || rec.total === 0) return null;
            return (rec.correct / rec.total * 100).toFixed(1);
        });
        return {
            label: `Season ${season}`,
            data,
            borderColor: palette[idx % palette.length],
            backgroundColor: "transparent",
            borderWidth: 2,
            pointRadius: 3,
            spanGaps: true
        };
    });

    if (weeklyChart) weeklyChart.destroy();

    weeklyChart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: {
            responsive: true,
            interaction: { mode: "index", intersect: false },
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: v => v + "%" }
                }
            }
        }
    });
}

function renderTeamChartFromData(teamStats) {
    const ctx = document.getElementById("teamChart").getContext("2d");

    const teams = Object.keys(teamStats).sort();
    const accuracies = teams.map(t => {
        const s = teamStats[t];
        return s.total > 0 ? (s.correct / s.total * 100).toFixed(1) : 0;
    });

    const bgColors = teams.map(t => {
        const c = TEAM_COLORS[t] || "#4b5563";
        return c + "CC";
    });
    const borderColors = teams.map(t => TEAM_COLORS[t] || "#4b5563");

    if (teamChart) teamChart.destroy();

    teamChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: teams,
            datasets: [{
                label: "Accuracy (%)",
                data: accuracies,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: v => v + "%" }
                }
            }
        }
    });
}

/* ---------- MAIN RENDER ---------- */
function getSelectedSeasons() {
    const select = document.getElementById("seasonSelect");
    const vals = [];
    for (const opt of select.options) {
        if (opt.selected) vals.push(Number(opt.value));
    }
    return vals;
}

function renderAll(gameLevel, rows) {
    const selectedSeasons = getSelectedSeasons();

    renderSummaryBox(gameLevel, selectedSeasons);

    const weeklyBySeason = computeWeeklyAccuracyBySeason(gameLevel, selectedSeasons);
    renderWeeklyChartFromData(weeklyBySeason);

    const teamStats = computeTeamAccuracy(rows, selectedSeasons);
    renderTeamChartFromData(teamStats);
}

/* ---------- INIT ---------- */
async function init() {
    showHistoryLoading(true);

    const manifest = await loadManifest();
    const historicalRaw = await loadHistoricalCSV();

    const historicalWithPred = filterHistoricalWithPredictions(historicalRaw, manifest);

    const gameLevel = dedupeGamesToGameLevel(historicalWithPred);

    populateSeasonDropdownFromGames(gameLevel);

    const seasonSelect = document.getElementById("seasonSelect");

    if (seasonSelect.options.length > 0) {
        const lastIdx = seasonSelect.options.length - 1;
        seasonSelect.options[lastIdx].selected = true;
    }

    renderAll(gameLevel, historicalWithPred);

    seasonSelect.addEventListener("change", () => {
        renderAll(gameLevel, historicalWithPred);
    });

    showHistoryLoading(false);
}

init();
</script>

</body>
</html>
