<!DOCTYPE html>
<html>
<head>
    <title>Historical Model Accuracy</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .chart-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto 30px auto;
        }

        .summary-box {
            background: #1f2933;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #3b4a5a;
        }

        .summary-item {
            margin-bottom: 8px;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        /* Dropdown styling */
        #seasonDropdownButton {
            padding: 8px 14px;
            background: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            border-radius: 6px;
            cursor: pointer;
        }

        #seasonDropdownMenu {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background: #111827;
            border: 1px solid #4b5563;
            border-radius: 6px;
            padding: 10px;
            z-index: 50;
            min-width: 200px;
        }

        #seasonCheckboxContainer {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- EVERYTHING IS NOW INSIDE THE CONTAINER -->
<div class="container">

    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Historical Model Accuracy</h1>

    <!-- Dropdown Season Selector -->
    <div style="text-align:center; margin-bottom:20px;">
        <div id="seasonDropdown" style="display:inline-block; position:relative;">
            <button id="seasonDropdownButton">Select Seasons ▼</button>

            <div id="seasonDropdownMenu">
                <label style="display:flex; align-items:center; gap:6px; margin-bottom:8px; cursor:pointer;">
                    <input type="checkbox" id="seasonSelectAll">
                    <strong>Select / Deselect All</strong>
                </label>

                <div id="seasonCheckboxContainer">
                    <!-- checkboxes inserted dynamically -->
                </div>
            </div>
        </div>
    </div>

    <div id="historyLoading" class="loading hidden">
        <div class="loader-spinner"></div>
        <div>Loading historical data...</div>
    </div>

    <div id="summaryBox" class="summary-box hidden"></div>

    <div class="chart-container">
        <h2 style="text-align:center; margin-bottom:10px;">Historical Accuracy by Week</h2>
        <canvas id="weeklyChart"></canvas>
    </div>

    <div class="chart-container">
        <h2 style="text-align:center; margin-bottom:10px;">Historical Accuracy by Team</h2>
        <canvas id="teamChart"></canvas>
    </div>

<script>
/* -------------------- DROPDOWN OPEN/CLOSE -------------------- */
document.addEventListener("click", (e) => {
    const btn = document.getElementById("seasonDropdownButton");
    const menu = document.getElementById("seasonDropdownMenu");

    if (btn.contains(e.target)) {
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    } else if (!menu.contains(e.target)) {
        menu.style.display = "none";
    }
});

/* -------------------- LOAD MANIFEST -------------------- */
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

/* -------------------- LOAD HISTORICAL CSV -------------------- */
async function loadHistoricalCSV() {
    const res = await fetch("data/nfl_historical_matchup_data.csv");
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

function showHistoryLoading(show) {
    const el = document.getElementById("historyLoading");
    if (show) el.classList.remove("hidden");
    else el.classList.add("hidden");
}

/* -------------------- TEAM COLORS -------------------- */
const TEAM_COLORS = {
    "ARI": "#97233F","ATL": "#A71930","BAL": "#241773","BUF": "#00338D",
    "CAR": "#0085CA","CHI": "#0B162A","CIN": "#FB4F14","CLE": "#311D00",
    "DAL": "#003594","DEN": "#FB4F14","DET": "#0076B6","GB":  "#203731",
    "HOU": "#03202F","IND": "#002C5F","JAX": "#006778","KC":  "#E31837",
    "LV":  "#000000","LAC": "#0080C6","LAR": "#003594","MIA": "#008E97",
    "MIN": "#4F2683","NE":  "#002244","NO":  "#D3BC8D","NYG": "#0B2265",
    "NYJ": "#125740","PHI": "#004C54","PIT": "#FFB612","SF":  "#AA0000",
    "SEA": "#002244","TB":  "#D50A0A","TEN": "#4B92DB","WAS": "#5A1414","WSH":"#5A1414"
};

/* -------------------- FIND LATEST PREDICTION ENTRY -------------------- */
function getLatestPredictionEntry(manifest) {
    return manifest.predictions_csv.reduce((a,b) => {
        if (Number(a.season) !== Number(b.season)) {
            return Number(a.season) > Number(b.season) ? a : b;
        }
        if (Number(a.postseason_ind) !== Number(b.postseason_ind)) {
            return Number(a.postseason_ind) > Number(b.postseason_ind) ? a : b;
        }
        return Number(a.week) > Number(b.week) ? a : b;
    });
}

/* -------------------- LOAD ALL PREDICTIONS (EXCEPT LATEST WEEK) -------------------- */
async function loadAllPredictions(manifest) {
    const latest = getLatestPredictionEntry(manifest);
    const latestKey = `${latest.season}-${latest.week}-${latest.postseason_ind}`;

    const predictionMap = {}; 
    // key: season-week-postseason_ind-teamsSorted -> predicted_winner

    const entries = manifest.predictions_csv.filter(p =>
        `${p.season}-${p.week}-${p.postseason_ind}` !== latestKey
    );

    for (const p of entries) {
        const path = `data/${p.file}`;
        const res = await fetch(path);
        if (!res.ok) continue;

        const text = await res.text();
        const rows = text.trim().split("\n").map(r => r.split(","));
        const headers = rows.shift();
        const records = rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));

        records.forEach(rec => {
            const season = rec.season;
            const week = rec.week;
            const team = rec.team_abbr;
            const opp = rec.opponent_abbr;
            const predicted_winner = rec.predicted_winner;

            const postseason_ind = String(p.postseason_ind ?? 0);
            const teamsSorted = [team, opp].sort().join("-");
            const key = `${season}-${week}-${postseason_ind}-${teamsSorted}`;

            predictionMap[key] = predicted_winner;
        });
    }

    return predictionMap;
}

/* -------------------- BUILD GAME-LEVEL DATA -------------------- */
function buildGamesFromHistoryAndPredictions(historicalRows, predictionMap) {
    const byGameId = {};

    historicalRows.forEach(r => {
        const game_id = r.game_id;
        if (!byGameId[game_id]) byGameId[game_id] = [];
        byGameId[game_id].push(r);
    });

    const games = [];

    Object.values(byGameId).forEach(rows => {
        if (rows.length === 0) return;

        const season = rows[0].season;
        const week = rows[0].week;
        const postseason_ind = rows[0].postseason_ind || "0";

        // Determine actual winner
        let actual_winner = null;
        let teams = new Set();

        rows.forEach(r => {
            teams.add(r.team_abbr);
            const win = String(r.win).toLowerCase() === "true";
            if (win) actual_winner = r.team_abbr;
        });

        if (!actual_winner) return;

        const teamList = Array.from(teams);
        if (teamList.length !== 2) return;

        const teamsSorted = [...teamList].sort().join("-");
        const key = `${season}-${week}-${postseason_ind}-${teamsSorted}`;
        const predicted_winner = predictionMap[key];

        if (!predicted_winner) return;

        games.push({
            season: Number(season),
            week: Number(week),
            postseason_ind: Number(postseason_ind),
            teams: teamList,
            actual_winner,
            predicted_winner
        });
    });

    return games;
}

/* -------------------- WEEKLY CHART -------------------- */
let weeklyChart = null;

function renderWeeklyChartFromData(weeklyBySeason) {
    const ctx = document.getElementById("weeklyChart").getContext("2d");

    const allKeysSet = new Set();
    Object.values(weeklyBySeason).forEach(weekMap => {
        Object.keys(weekMap).forEach(k => allKeysSet.add(k));
    });

    const allKeys = Array.from(allKeysSet).map(k => {
        const [ps, w] = k.split("-").map(Number);
        return {ps, w, key: k};
    }).sort((a,b) => {
        if (a.ps !== b.ps) return a.ps - b.ps;
        return a.w - b.w;
    });

    const labels = allKeys.map(k =>
        k.ps === 1 ? `Postseason Week ${k.w}` : `Week ${k.w}`
    );

    const seasonIds = Object.keys(weeklyBySeason).map(Number).sort((a,b) => a - b);

    const palette = [
        "#4da3ff","#34d399","#f97316","#e11d48",
        "#a855f7","#22c55e","#facc15","#0ea5e9"
    ];

    const datasets = seasonIds.map((season, idx) => {
        const weekMap = weeklyBySeason[season];
        const data = allKeys.map(k => {
            const rec = weekMap[k.key];
            if (!rec || rec.total === 0) return null;
            return (rec.correct / rec.total * 100).toFixed(1);
        });
        return {
            label: `Season ${season}`,
            data,
            borderColor: palette[idx % palette.length],
            backgroundColor: "transparent",
            borderWidth: 2,
            pointRadius: 3,
            spanGaps: true
        };
    });

    if (weeklyChart) weeklyChart.destroy();

    weeklyChart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: {
            responsive: true,
            interaction: { mode: "index", intersect: false },
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: v => v + "%" }
                }
            }
        }
    });
}

/* -------------------- TEAM CHART -------------------- */
let teamChart = null;

function renderTeamChartFromData(teamStats) {
    const ctx = document.getElementById("teamChart").getContext("2d");

    const teams = Object.keys(teamStats).sort();
    const accuracies = teams.map(t => {
        const s = teamStats[t];
        return s.total > 0 ? (s.correct / s.total * 100).toFixed(1) : 0;
    });

    const bgColors = teams.map(t => {
        const c = TEAM_COLORS[t] || "#4b5563";
        return c + "CC";
    });
    const borderColors = teams.map(t => TEAM_COLORS[t] || "#4b5563");

    if (teamChart) teamChart.destroy();

    teamChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: teams,
            datasets: [{
                label: "Accuracy (%)",
                data: accuracies,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: v => v + "%" }
                }
            }
        }
    });
}

/* -------------------- MAIN RENDER -------------------- */
function renderAll(games) {
    const selectedSeasons = getSelectedSeasons();

    renderSummaryBox(games, selectedSeasons);

    const weeklyBySeason = computeWeeklyAccuracyBySeason(games, selectedSeasons);
    renderWeeklyChartFromData(weeklyBySeason);

    const teamStats = computeTeamAccuracy(games, selectedSeasons);
    renderTeamChartFromData(teamStats);
}

/* -------------------- INIT -------------------- */
async function init() {
    showHistoryLoading(true);

    const manifest = await loadManifest();
    const historicalRaw = await loadHistoricalCSV();
    const predictionMap = await loadAllPredictions(manifest);

    const games = buildGamesFromHistoryAndPredictions(historicalRaw, predictionMap);

    populateSeasonCheckboxes(games);

    // Initial render
    renderAll(games);

    // Re-render when any checkbox changes
    document.getElementById("seasonCheckboxContainer").addEventListener("change", () => {
        renderAll(games);
    });

    showHistoryLoading(false);
}

init();
</script>

</div> <!-- END .container -->

</body>
</html>
