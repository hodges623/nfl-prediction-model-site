<!DOCTYPE html>
<html>
<head>
    <title>Modeled NFL Predictions</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Dropdown button */
        .pred-dropdown-button {
            padding: 8px 14px;
            background: #1f2937;
            color: white;
            border: 1px solid #4b5563;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Dropdown menu */
        .pred-dropdown-menu {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background: #111827;
            border: 1px solid #4b5563;
            border-radius: 6px;
            padding: 10px;
            z-index: 50;
            min-width: 200px;
        }

        /* Dropdown wrapper */
        .pred-dropdown-wrapper {
            position: relative;
            display: inline-block;
            margin: 0 10px;
        }

        .pred-dropdown-item {
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .pred-dropdown-item:hover {
            background: #374151;
        }

        /* --- CARD VIEW STYLES --- */
        .view-toggle {
            text-align: center;
            margin: 20px 0;
        }
        .toggle-btn {
            padding: 8px 16px;
            margin: 0 6px;
            border-radius: 6px;
            border: 1px solid #4da3ff;
            background: #1f2933;
            color: #e5e7eb;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .toggle-btn.active {
            background: #4da3ff;
            color: #000;
            font-weight: bold;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-top: 16px;
        }

        @media (max-width: 700px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        .game-card {
            background: #1f2933;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.35);
            border: 1px solid #3b4a5a;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 4px;
        }

        .winner-border {
            border: 0px solid rgba(52,211,153,0.8);
            padding: 0px;
            border-radius: 0px;
        }

        .pill-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            margin-bottom: 4px;
        }

        .pill-green {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: rgba(52,211,153,0.15);
            border: 1px solid rgba(52,211,153,0.7);
            color: #bbf7d0;
            font-weight: 600;
        }

        .pill-blue {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: rgba(96,165,250,0.15);
            border: 1px solid rgba(96,165,250,0.7);
            color: #bfdbfe;
            font-weight: 600;
        }

        .game-card-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        .game-card-label {
            color: #9ca3af;
        }
        .game-card-value {
            font-weight: 500;
        }

        .edge-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            margin-left: 6px;
        }
        .edge-with {
            background: rgba(52,211,153,0.15);
            border: 1px solid rgba(52,211,153,0.7);
            color: #bbf7d0;
        }
        .edge-against {
            background: rgba(248,113,113,0.15);
            border: 1px solid rgba(248,113,113,0.7);
            color: #fecaca;
        }

        /* --- TABLE VIEW STYLES --- */
        #tableViewWrapper {
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            padding: 8px 10px;
            border-bottom: 1px solid #3b4a5a;
        }
        th {
            background: #111827;
            text-align: left;
        }
        .predicted-winner-cell {
            font-weight: bold;
            background: rgba(52,211,153,0.15);
        }
    </style>
</head>

<body>

<div class="container">

    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Modeled NFL Predictions</h1>

    <!-- FIXED: Custom dropdowns (no <select> elements) -->
    <div style="text-align:center; margin-bottom:20px;">

        <!-- Season Dropdown -->
        <div class="pred-dropdown-wrapper">
            <button id="seasonDropdownBtn" class="pred-dropdown-button">Season ▼</button>
            <div id="seasonDropdownMenu" class="pred-dropdown-menu"></div>
        </div>

        <!-- Week Dropdown -->
        <div class="pred-dropdown-wrapper">
            <button id="weekDropdownBtn" class="pred-dropdown-button">Week ▼</button>
            <div id="weekDropdownMenu" class="pred-dropdown-menu"></div>
        </div>

    </div>

    <div class="view-toggle">
        <button id="cardViewBtn" class="toggle-btn active">Card View</button>
        <button id="tableViewBtn" class="toggle-btn">Table View</button>
    </div>

    <div id="predictionsLoading" class="loading hidden">
        <div class="loader-spinner"></div>
        <div>Loading predictions...</div>
    </div>

    <div id="summaryBox" class="summary-box hidden"></div>

    <div id="cardViewWrapper"></div>

    <div id="tableViewWrapper" class="hidden"></div>

    <div id="downloadContainer" style="text-align: right; margin-top: 10px;"></div>

</div>

<script>
/* -------------------- DROPDOWN OPEN/CLOSE -------------------- */
document.addEventListener("click", (e) => {
    const seasonBtn = document.getElementById("seasonDropdownBtn");
    const seasonMenu = document.getElementById("seasonDropdownMenu");

    const weekBtn = document.getElementById("weekDropdownBtn");
    const weekMenu = document.getElementById("weekDropdownMenu");

    if (seasonBtn.contains(e.target)) {
        seasonMenu.style.display = seasonMenu.style.display === "block" ? "none" : "block";
        weekMenu.style.display = "none";
    } else if (weekBtn.contains(e.target)) {
        weekMenu.style.display = weekMenu.style.display === "block" ? "none" : "block";
        seasonMenu.style.display = "none";
    } else {
        seasonMenu.style.display = "none";
        weekMenu.style.display = "none";
    }
});

/* -------------------- LOAD MANIFEST -------------------- */
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

function showPredictionsLoading(show) {
    const el = document.getElementById("predictionsLoading");
    if (show) el.classList.remove("hidden");
    else el.classList.add("hidden");
}

/* -------------------- POPULATE SEASON DROPDOWN -------------------- */
function populateSeasonDropdown(manifest) {
    const menu = document.getElementById("seasonDropdownMenu");
    menu.innerHTML = "";

    const seasons = [...new Set(manifest.predictions_csv.map(p => Number(p.season)))]
        .sort((a,b) => a - b);

    seasons.forEach(season => {
        const item = document.createElement("div");
        item.className = "pred-dropdown-item";
        item.textContent = season;

        item.onclick = () => {
            selectedSeason = season;
            document.getElementById("seasonDropdownBtn").textContent = season + " ▼";

            populateWeekDropdown(manifest, season);

            // Auto-select latest week in this season
            const entries = manifest.predictions_csv.filter(
                p => Number(p.season) === Number(season)
            );

            if (entries.length > 0) {
                const latest = entries.reduce((a,b) => {
                    if (Number(a.postseason_ind) !== Number(b.postseason_ind)) {
                        return Number(a.postseason_ind) > Number(b.postseason_ind) ? a : b;
                    }
                    return Number(a.week) > Number(b.week) ? a : b;
                });

                selectedWeek = latest.week;
                selectedPostseason = latest.postseason_ind;

                document.getElementById("weekDropdownBtn").textContent =
                    `Week ${latest.week} (P${latest.postseason_ind}) ▼`;

                loadPrediction(manifest, season, latest.week, latest.postseason_ind);
            }

            menu.style.display = "none";
        };

        menu.appendChild(item);
    });
}

/* -------------------- POPULATE WEEK DROPDOWN -------------------- */
function populateWeekDropdown(manifest, season) {
    const menu = document.getElementById("weekDropdownMenu");
    menu.innerHTML = "";

    const entries = manifest.predictions_csv
        .filter(p => Number(p.season) === Number(season))
        .sort((a,b) => {
            if (Number(a.postseason_ind) !== Number(b.postseason_ind)) {
                return Number(a.postseason_ind) - Number(b.postseason_ind);
            }
            return Number(a.week) - Number(b.week);
        });

    entries.forEach(entry => {
        const label = entry.postseason_ind === "1"
            ? `Postseason Week ${entry.week}`
            : `Week ${entry.week}`;

        const item = document.createElement("div");
        item.className = "pred-dropdown-item";
        item.textContent = label;

        item.onclick = () => {
            selectedWeek = entry.week;
            selectedPostseason = entry.postseason_ind;

            document.getElementById("weekDropdownBtn").textContent =
                `${label} ▼`;

            loadPrediction(manifest, season, entry.week, entry.postseason_ind);

            menu.style.display = "none";
        };

        menu.appendChild(item);
    });
}

/* -------------------- FIND LATEST ENTRY OVERALL -------------------- */
function getLatestEntry(manifest) {
    return manifest.predictions_csv.reduce((a,b) => {
        if (Number(a.season) !== Number(b.season)) {
            return Number(a.season) > Number(b.season) ? a : b;
        }
        if (Number(a.postseason_ind) !== Number(b.postseason_ind)) {
            return Number(a.postseason_ind) > Number(b.postseason_ind) ? a : b;
        }
        return Number(a.week) > Number(b.week) ? a : b;
    });
}

/* -------------------- LOAD CSV -------------------- */
async function loadCSV(path) {
    const res = await fetch(path);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

/* -------------------- NORMALIZATION HELPERS -------------------- */
function parseProb(val) {
    let p = parseFloat(val);
    if (isNaN(p)) return null;
    if (p > 1) p = p / 100;
    return p;
}

function formatPercent(prob) {
    if (prob == null || isNaN(prob)) return "";
    return (prob * 100).toFixed(1) + "%";
}

function normalizeRow(row) {
    if (row["team_abbr"]) {
        row["Home Team"] = row["team_abbr"];
        row["Away Team"] = row["opponent_abbr"];
        row["Predicted Winner"] = row["predicted_winner"];
        row["Win Probability"] = row["winner_probability"];

        delete row["team_abbr"];
        delete row["opponent_abbr"];
        delete row["predicted_winner"];
        delete row["winner_probability"];
        delete row["season"];
        delete row["week"];
    }
    return row;
}

/* -------------------- SUMMARY BOX -------------------- */
function buildSummary(rows) {
    if (!rows || rows.length === 0) return null;

    const mostConf = {prob: -1};
    const closest = {dist: 999};
    let biggestDev = null;

    rows.forEach(r => {
        const prob = parseProb(r["Win Probability"]);
        if (prob == null) return;

        const home = r["Home Team"];
        const away = r["Away Team"];
        const pred = r["Predicted Winner"];

        if (prob > mostConf.prob) {
            mostConf.prob = prob;
            mostConf.home = home;
            mostConf.away = away;
            mostConf.pred = pred;
        }

        const dist = Math.abs(prob - 0.5);
        if (dist < closest.dist) {
            closest.dist = dist;
            closest.prob = prob;
            closest.home = home;
            closest.away = away;
            closest.pred = pred;
        }

        if (r["Win Spread"] && r["Book Spread"]) {
            const modelSpread = parseFloat(r["Win Spread"]);
            const book = parseFloat(r["Book Spread"]);
            if (!isNaN(modelSpread) && !isNaN(book)) {
                const dev = Math.abs(modelSpread - book);
                if (!biggestDev || dev > biggestDev.dev) {
                    biggestDev = {home, away, modelSpread, book, dev};
                }
            }
        }
    });

    return {mostConf, closest, biggestDev};
}

function renderSummaryBox(summary) {
    const box = document.getElementById("summaryBox");

    if (!summary) {
        box.classList.add("hidden");
        return;
    }

    const {mostConf, closest, biggestDev} = summary;

    let html = "<h2>Week Summary</h2>";

    html += `<div class="summary-item"><strong>Most Confident Matchup:</strong> ${mostConf.home} vs ${mostConf.away} — ${formatPercent(mostConf.prob)} (Predicted: ${mostConf.pred})</div>`;
    html += `<div class="summary-item"><strong>Closest Matchup:</strong> ${closest.home} vs ${closest.away} — ${formatPercent(closest.prob)} (Predicted: ${closest.pred})</div>`;

    if (biggestDev) {
        html += `<div class="summary-item"><strong>Biggest Deviation from Book Spread:</strong> ${biggestDev.home} vs ${biggestDev.away} — Win Spread: ${biggestDev.modelSpread.toFixed(1)}, Book Spread: ${biggestDev.book.toFixed(1)} (Δ = ${biggestDev.dev.toFixed(1)})</div>`;
    }

    box.innerHTML = html;
    box.classList.remove("hidden");
}

/* -------------------- CARD VIEW -------------------- */
function renderCardView(rows) {
    const container = document.getElementById("cardViewWrapper");
    container.innerHTML = "";

    if (!rows || rows.length === 0) {
        container.innerHTML = "<p>No prediction data available for this week.</p>";
        document.getElementById("summaryBox").classList.add("hidden");
        return;
    }

    rows = rows.map(normalizeRow);

    rows.sort((a, b) => {
        const pa = parseProb(a["Win Probability"]) ?? -1;
        const pb = parseProb(b["Win Probability"]) ?? -1;
        return pb - pa;
    });

    const summary = buildSummary(rows);
    renderSummaryBox(summary);

    let html = '<div class="cards-grid">';

    rows.forEach(row => {
        const home = row["Home Team"];
        const away = row["Away Team"];
        const pred = row["Predicted Winner"];
        const prob = parseProb(row["Win Probability"]);
        const probText = formatPercent(prob);

        const winSpread = row["Win Spread"] ? parseFloat(row["Win Spread"]) : null;
        const bookSpread = row["Book Spread"] ? parseFloat(row["Book Spread"]) : null;
        const versus = row["Versus Book"] || null;

        const hasSpreads = winSpread !== null && !isNaN(winSpread) && bookSpread !== null && !isNaN(bookSpread);

        let edgeClass = "";
        let edgeLabel = "";
        if (versus) {
            const v = String(versus).toLowerCase();
            if (v.includes("with")) {
                edgeClass = "edge-with";
                edgeLabel = "With Book";
            } else if (v.includes("against")) {
                edgeClass = "edge-against";
                edgeLabel = "Against Book";
            }
        }

        html += `<div class="game-card">`;

        html += `
            <div style="display:flex; justify-content:center; text-align:center; width:100%; margin-bottom:6px;">
                <div style="display:flex; align-items:center; justify-content:center; gap:28px; width:100%;">

                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <img class="team-logo ${pred === away ? 'winner-border' : ''}" src="assets/logos/${away}.png">
                        <div style="margin-top:4px; font-weight:600;">${away}</div>
                    </div>

                    <div style="font-size:1.6rem; font-weight:bold; color:#e5e7eb;">@</div>

                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <img class="team-logo ${pred === home ? 'winner-border' : ''}" src="assets/logos/${home}.png">
                        <div style="margin-top:4px; font-weight:600;">${home}</div>
                    </div>

                </div>
            </div>
        `;

        html += `
            <div class="pill-row">
                <span class="pill-green">Model Pick: ${pred}</span>
                <span class="pill-blue">${probText}</span>
            </div>
        `;

        if (hasSpreads) {
            html += `
                <div class="game-card-row">
                    <div class="game-card-label">Model Spread</div>
                    <div class="game-card-value">${winSpread.toFixed(1)}</div>
                </div>
                <div class="game-card-row">
                    <div class="game-card-label">Book Spread</div>
                    <div class="game-card-value">${bookSpread.toFixed(1)}</div>
                </div>
            `;

            if (edgeLabel) {
                html += `
                    <div class="game-card-row">
                        <div class="game-card-label">Edge</div>
                        <div class="game-card-value">
                            <span class="edge-badge ${edgeClass}">${edgeLabel}</span>
                        </div>
                    </div>
                `;
            }
        }

        html += `</div>`;
    });

    html += '</div>';
    container.innerHTML = html;
}

/* -------------------- TABLE VIEW -------------------- */
function renderTableView(rows) {
    const container = document.getElementById("tableViewWrapper");
    container.innerHTML = "";

    if (!rows || rows.length === 0) {
        container.innerHTML = "<p>No prediction data available for this week.</p>";
        return;
    }

    rows = rows.map(normalizeRow);

    const headers = Object.keys(rows[0]).filter(h =>
        !["season", "week"].includes(h.toLowerCase())
    );

    rows.sort((a, b) => {
        const pa = parseProb(a["Win Probability"]) ?? -1;
        const pb = parseProb(b["Win Probability"]) ?? -1;
        return pb - pa;
    });

    let html = "<table><thead><tr>";
    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr></thead><tbody>";

    rows.forEach(row => {
        html += "<tr>";
        headers.forEach(h => {
            let display = row[h];

            if (h === "Win Probability") {
                display = formatPercent(parseProb(display));
            }

            if (h === "Predicted Winner") {
                html += `<td class="predicted-winner-cell">${display}</td>`;
            } else {
                html += `<td>${display}</td>`;
            }
        });
        html += "</tr>";
    });

    html += "</tbody></table>";
    container.innerHTML = html;
}

/* -------------------- DOWNLOAD BUTTON -------------------- */
function renderDownloadButton(filePath) {
    const container = document.getElementById("downloadContainer");
    container.innerHTML = "";

    if (!filePath) return;

    const a = document.createElement("a");
    a.href = filePath;
    a.textContent = "Download CSV";
    a.className = "download-btn";
    a.setAttribute("download", "");
    container.appendChild(a);
}

/* -------------------- LOAD PREDICTION -------------------- */
async function loadPrediction(manifest, season, week, postseason_ind) {
    showPredictionsLoading(true);

    const entry = manifest.predictions_csv.find(
        p =>
            Number(p.season) === Number(season) &&
            Number(p.week) === Number(week) &&
            Number(p.postseason_ind) === Number(postseason_ind)
    );

    if (!entry) {
        document.getElementById("cardViewWrapper").innerHTML =
            "<p>No prediction file found for this season/week.</p>";
        document.getElementById("tableViewWrapper").innerHTML = "";
        document.getElementById("summaryBox").classList.add("hidden");
        document.getElementById("downloadContainer").innerHTML = "";
        showPredictionsLoading(false);
        return;
    }

    const path = `data/${entry.file}`;
    renderDownloadButton(path);

    try {
        const csvData = await loadCSV(path);

        renderCardView(csvData);
        renderTableView(csvData);

    } catch {
        document.getElementById("cardViewWrapper").innerHTML =
            "<p>Error loading prediction data.</p>";
        document.getElementById("tableViewWrapper").innerHTML = "";
        document.getElementById("summaryBox").classList.add("hidden");
    } finally {
        showPredictionsLoading(false);
    }
}

/* -------------------- INIT (FULLY FIXED) -------------------- */
let selectedSeason = null;
let selectedWeek = null;
let selectedPostseason = null;

async function init() {
    showPredictionsLoading(true);

    const manifest = await loadManifest();

    /* Populate seasons */
    populateSeasonDropdown(manifest);

    /* Determine latest entry overall */
    const latest = getLatestEntry(manifest);

    selectedSeason = Number(latest.season);
    selectedWeek = Number(latest.week);
    selectedPostseason = Number(latest.postseason_ind);

    /* Update season button */
    document.getElementById("seasonDropdownBtn").textContent =
        `${selectedSeason} ▼`;

    /* Populate weeks for that season */
    populateWeekDropdown(manifest, selectedSeason);

    /* Update week button */
    const weekLabel = selectedPostseason === 1
        ? `Postseason Week ${selectedWeek}`
        : `Week ${selectedWeek}`;

    document.getElementById("weekDropdownBtn").textContent =
        `${weekLabel} ▼`;

    /* Load initial prediction */
    await loadPrediction(manifest, selectedSeason, selectedWeek, selectedPostseason);

    /* View toggle */
    const cardBtn = document.getElementById("cardViewBtn");
    const tableBtn = document.getElementById("tableViewBtn");
    const cardWrapper = document.getElementById("cardViewWrapper");
    const tableWrapper = document.getElementById("tableViewWrapper");

    cardBtn.addEventListener("click", () => {
        cardBtn.classList.add("active");
        tableBtn.classList.remove("active");
        cardWrapper.classList.remove("hidden");
        tableWrapper.classList.add("hidden");
    });

    tableBtn.addEventListener("click", () => {
        tableBtn.classList.add("active");
        cardBtn.classList.remove("active");
        tableWrapper.classList.remove("hidden");
        cardWrapper.classList.add("hidden");
    });

    showPredictionsLoading(false);
}

init();
</script>

</body>
</html>
