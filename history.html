<!DOCTYPE html>
<html>
<head>
    <title>Historical Model Accuracy</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .chart-container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .summary-box {
            background: #1f2933;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #3b4a5a;
        }

        .summary-item {
            margin-bottom: 8px;
        }

        .toggle-row {
            text-align: center;
            margin-bottom: 20px;
        }

        .toggle-btn {
            padding: 8px 16px;
            margin: 0 6px;
            border-radius: 6px;
            border: 1px solid #4da3ff;
            background: #1f2933;
            color: #e5e7eb;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .toggle-btn.active {
            background: #4da3ff;
            color: #000;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Historical Model Accuracy</h1>

    <div style="text-align:center; margin-bottom:20px;">
        <label for="seasonSelect" style="font-weight:bold;">Select Season:</label>
        <select id="seasonSelect" style="margin-left:10px;"></select>

        <label for="viewSelect" style="margin-left:20px; font-weight:bold;">View:</label>
        <select id="viewSelect" style="margin-left:10px;">
            <option value="season">Season Summary</option>
            <option value="week">Weekly Accuracy</option>
        </select>
    </div>

    <div id="historyLoading" class="loading hidden">
        <div class="loader-spinner"></div>
        <div>Loading historical data...</div>
    </div>

    <div id="summaryBox" class="summary-box hidden"></div>

    <div class="chart-container">
        <canvas id="historyChart"></canvas>
    </div>

</div>

<script>
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

async function loadHistoricalCSV() {
    const res = await fetch("data/nfl_historical_matchup_data.csv");
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

function showHistoryLoading(show) {
    const el = document.getElementById("historyLoading");
    if (show) el.classList.remove("hidden");
    else el.classList.add("hidden");
}

/* -------------------- SEASON DROPDOWN -------------------- */
function populateSeasonDropdown(manifest) {
    const seasons = [...new Set(manifest.predictions_csv.map(item => Number(item.season)))].sort((a,b) => a - b);
    const seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = "";

    seasons.forEach(season => {
        const opt = document.createElement("option");
        opt.value = season;
        opt.textContent = season;
        seasonSelect.appendChild(opt);
    });
}

/* -------------------- FILTER HISTORICAL GAMES WITH PREDICTIONS -------------------- */
function filterHistoricalWithPredictions(historical, manifest) {
    const predictionIndex = new Set(
        manifest.predictions_csv.map(
            p => `${p.season}-${p.week}-${p.postseason_ind}`
        )
    );

    return historical.filter(h => {
        const key = `${h.season}-${h.week}-${h.postseason_ind}`;
        return predictionIndex.has(key);
    });
}

/* -------------------- GROUP BY SEASON -------------------- */
function groupBySeason(rows) {
    const map = {};
    rows.forEach(r => {
        const s = Number(r.season);
        if (!map[s]) map[s] = [];
        map[s].push(r);
    });
    return map;
}

/* -------------------- CALCULATE ACCURACY -------------------- */
function calculateSeasonAccuracy(rows) {
    let correct = 0;
    let total = 0;

    rows.forEach(r => {
        const pred = r.predicted_winner;
        const actual = r.actual_winner;

        if (pred && actual) {
            total++;
            if (pred === actual) correct++;
        }
    });

    return total > 0 ? correct / total : 0;
}

function calculateWeeklyAccuracy(rows) {
    const map = {};

    rows.forEach(r => {
        const week = `${r.week}-${r.postseason_ind}`;
        if (!map[week]) map[week] = {correct:0, total:0};

        if (r.predicted_winner && r.actual_winner) {
            map[week].total++;
            if (r.predicted_winner === r.actual_winner) {
                map[week].correct++;
            }
        }
    });

    const result = [];
    for (const key of Object.keys(map)) {
        const [week, postseason_ind] = key.split("-").map(Number);
        const acc = map[key].total > 0 ? map[key].correct / map[key].total : 0;
        result.push({week, postseason_ind, accuracy: acc});
    }

    result.sort((a,b) => {
        if (a.postseason_ind !== b.postseason_ind) {
            return a.postseason_ind - b.postseason_ind;
        }
        return a.week - b.week;
    });

    return result;
}

/* -------------------- RENDER SEASON SUMMARY -------------------- */
function renderSeasonSummary(rows) {
    const summaryBox = document.getElementById("summaryBox");
    summaryBox.classList.remove("hidden");

    const accuracy = calculateSeasonAccuracy(rows);
    const pct = (accuracy * 100).toFixed(1);

    summaryBox.innerHTML = `
        <h2>Season Summary</h2>
        <div class="summary-item"><strong>Total Games with Predictions:</strong> ${rows.length}</div>
        <div class="summary-item"><strong>Overall Accuracy:</strong> ${pct}%</div>
    `;
}

/* -------------------- RENDER WEEKLY CHART -------------------- */
let historyChart = null;

function renderWeeklyChart(weeklyData) {
    const ctx = document.getElementById("historyChart").getContext("2d");

    const labels = weeklyData.map(w =>
        w.postseason_ind === 1
            ? `P${w.week}`
            : `W${w.week}`
    );

    const values = weeklyData.map(w => (w.accuracy * 100).toFixed(1));

    if (historyChart) {
        historyChart.destroy();
    }

    historyChart = new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Accuracy (%)",
                data: values,
                borderColor: "#4da3ff",
                backgroundColor: "rgba(77,163,255,0.2)",
                borderWidth: 2,
                pointRadius: 4,
                pointBackgroundColor: "#4da3ff"
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    ticks: { callback: v => v + "%" }
                }
            }
        }
    });
}

/* -------------------- MAIN RENDER FUNCTION -------------------- */
function renderHistoryView(season, view, historical, manifest) {
    const filtered = filterHistoricalWithPredictions(historical, manifest)
        .filter(r => Number(r.season) === Number(season));

    if (filtered.length === 0) {
        document.getElementById("summaryBox").classList.remove("hidden");
        document.getElementById("summaryBox").innerHTML =
            "<h2>No historical predictions available for this season.</h2>";
        if (historyChart) historyChart.destroy();
        return;
    }

    if (view === "season") {
        renderSeasonSummary(filtered);

        if (historyChart) historyChart.destroy();
        const ctx = document.getElementById("historyChart").getContext("2d");
        historyChart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: ["Accuracy"],
                datasets: [{
                    label: "Accuracy (%)",
                    data: [(calculateSeasonAccuracy(filtered) * 100).toFixed(1)],
                    backgroundColor: "rgba(52,211,153,0.5)",
                    borderColor: "rgba(52,211,153,1)",
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        min: 0,
                        max: 100,
                        ticks: { callback: v => v + "%" }
                    }
                }
            }
        });

    } else if (view === "week") {
        const weekly = calculateWeeklyAccuracy(filtered);

        document.getElementById("summaryBox").classList.remove("hidden");
        document.getElementById("summaryBox").innerHTML = `
            <h2>Weekly Accuracy</h2>
            <div class="summary-item">Includes only weeks where predictions exist.</div>
        `;

        renderWeeklyChart(weekly);
    }
}

/* -------------------- INIT -------------------- */
async function init() {
    showHistoryLoading(true);

    const manifest = await loadManifest();
    const historical = await loadHistoricalCSV();

    populateSeasonDropdown(manifest);

    const seasonSelect = document.getElementById("seasonSelect");
    const viewSelect = document.getElementById("viewSelect");

    /* Default to latest season with predictions */
    const seasons = [...new Set(manifest.predictions_csv.map(p => Number(p.season)))];
    const latestSeason = Math.max(...seasons);
    seasonSelect.value = latestSeason;

    renderHistoryView(latestSeason, viewSelect.value, historical, manifest);

    seasonSelect.addEventListener("change", () => {
        renderHistoryView(seasonSelect.value, viewSelect.value, historical, manifest);
    });

    viewSelect.addEventListener("change", () => {
        renderHistoryView(seasonSelect.value, viewSelect.value, historical, manifest);
    });

    showHistoryLoading(false);
}

init();
</script>

</body>
</html>
