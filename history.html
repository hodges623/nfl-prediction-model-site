<!DOCTYPE html>
<html>
<head>
    <title>Historical Model Accuracy</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for team accuracy chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <!-- Navigation -->
    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Historical Model Accuracy</h1>

    <!-- View Mode Selector -->
    <div style="margin-bottom: 10px;">
        <label for="viewMode" style="font-weight: bold;">View Accuracy By:</label>
        <select id="viewMode" style="margin-left: 10px;">
            <option value="week">Week</option>
            <option value="season">Season</option>
        </select>
    </div>

    <!-- Loading indicator -->
    <div id="historyLoading" class="loading">
        <div class="loader-spinner"></div>
        <div>Calculating historical accuracy...</div>
    </div>

    <table id="accuracyTable" class="hidden">
        <thead>
            <tr>
                <th>Season</th>
                <th>Week</th>
                <th>Games</th>
                <th>Correct</th>
                <th>Accuracy</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Team accuracy chart -->
    <div class="chart-container">
        <h2 style="text-align:center; margin-top:0; font-size:1.1rem;">Model Accuracy by Team</h2>
        <canvas id="teamAccuracyChart"></canvas>
    </div>

</div>

<script>
// Load CSV file into array of objects
async function loadCSV(path) {
    const res = await fetch(path);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

// Load manifest.json
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

function showHistoryLoading(show) {
    const loadingEl = document.getElementById("historyLoading");
    const tableEl = document.getElementById("accuracyTable");
    if (show) {
        loadingEl.classList.remove("hidden");
        tableEl.classList.add("hidden");
    } else {
        loadingEl.classList.add("hidden");
        tableEl.classList.remove("hidden");
    }
}

// Render table based on mode (week or season)
function renderTable(grouped, mode) {
    const tbody = document.querySelector("#accuracyTable tbody");
    tbody.innerHTML = "";

    if (mode === "week") {
        Object.entries(grouped).forEach(([key, stats]) => {
            const [season, week] = key.split("-");
            const acc = (stats.correct / stats.games * 100).toFixed(1) + "%";

            tbody.innerHTML += `
                <tr>
                    <td>${season}</td>
                    <td>${week}</td>
                    <td>${stats.games}</td>
                    <td>${stats.correct}</td>
                    <td>${acc}</td>
                </tr>
            `;
        });
    } else {
        // Aggregate by season
        const seasonTotals = {};

        Object.entries(grouped).forEach(([key, stats]) => {
            const [season] = key.split("-");
            if (!seasonTotals[season]) seasonTotals[season] = {games: 0, correct: 0};
            seasonTotals[season].games += stats.games;
            seasonTotals[season].correct += stats.correct;
        });

        Object.entries(seasonTotals).forEach(([season, stats]) => {
            const acc = (stats.correct / stats.games * 100).toFixed(1) + "%";

            tbody.innerHTML += `
                <tr>
                    <td>${season}</td>
                    <td>—</td>
                    <td>${stats.games}</td>
                    <td>${stats.correct}</td>
                    <td>${acc}</td>
                </tr>
            `;
        });
    }
}

let teamAccuracyChart = null;

function renderTeamAccuracyChart(teamStats) {
    const labels = [];
    const data = [];

    Object.entries(teamStats).forEach(([team, stats]) => {
        if (stats.games > 0) {
            labels.push(team);
            data.push((stats.correct / stats.games * 100).toFixed(1));
        }
    });

    const ctx = document.getElementById("teamAccuracyChart").getContext("2d");

    if (teamAccuracyChart) {
        teamAccuracyChart.destroy();
    }

    teamAccuracyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: 'Accuracy (%)',
                data,
                backgroundColor: '#2b5fb8'
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => `${ctx.parsed.y}%`
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: '#f5f5f5' },
                    grid: { color: '#333' }
                },
                y: {
                    beginAtZero: true,
                    max: 100,
                    ticks: { color: '#f5f5f5' },
                    grid: { color: '#333' }
                }
            }
        }
    });
}

async function buildAccuracy() {
    showHistoryLoading(true);

    const manifest = await loadManifest();
    const history = await loadCSV("data/nfl_historical_matchup_data.csv");

    // Build set of valid season-week combos based on predictions
    const validKeys = new Set(
        manifest.predictions_csv.map(p => `${p.season}-${p.week}`)
    );

    // Load all prediction CSVs dynamically
    const predictions = [];
    for (const entry of manifest.predictions_csv) {
        const rows = await loadCSV(`data/${entry.file}`);
        predictions.push(...rows);
    }

    // Index predictions by season-week-team-opponent
    const predIndex = {};
    predictions.forEach(p => {
        const key = `${p.season}-${p.week}-${p.team_abbr}-${p.opponent_abbr}`;
        predIndex[key] = p;
    });

    // Group historical rows by game_id (two rows per game)
    const games = {};
    history.forEach(h => {
        const key = `${h.game_id}`;
        if (!games[key]) games[key] = [];
        games[key].push(h);
    });

    // Group accuracy by season-week
    const grouped = {};
    // Team accuracy stats
    const teamStats = {};

    Object.values(games).forEach(rows => {
        const h = rows[0]; // both rows share season/week/game_id

        const season = h.season;
        const week = h.week;
        const keyWeek = `${season}-${week}`;

        // Only evaluate games that were predicted
        if (!validKeys.has(keyWeek)) return;

        // Determine actual winner (look for win === "True")
        const winnerRow = rows.find(r => r.win === "True");
        const loserRow = rows.find(r => r.win === "False");

        if (!winnerRow || !loserRow) return;

        const actualWinner = winnerRow.team_abbr;

        // Build prediction lookup keys (both directions)
        const predKey = `${season}-${week}-${winnerRow.team_abbr}-${loserRow.team_abbr}`;
        const predKeyReverse = `${season}-${week}-${loserRow.team_abbr}-${winnerRow.team_abbr}`;

        const pred =
            predIndex[predKey] ||
            predIndex[predKeyReverse];

        if (!grouped[keyWeek]) grouped[keyWeek] = {games: 0, correct: 0};
        grouped[keyWeek].games++;

        const isCorrect = pred && pred.predicted_winner === actualWinner;
        if (isCorrect) grouped[keyWeek].correct++;

        // Team accuracy: count for both teams in the game
        const teamsInGame = rows.map(r => r.team_abbr);
        teamsInGame.forEach(team => {
            if (!teamStats[team]) teamStats[team] = {games: 0, correct: 0};
            teamStats[team].games += 1;
            if (isCorrect) teamStats[team].correct += 1;
        });
    });

    // Handle view mode switching
    const viewMode = document.getElementById("viewMode");
    viewMode.addEventListener("change", () => {
        renderTable(grouped, viewMode.value);
    });

    // Default view: season
    viewMode.value = "season";
    renderTable(grouped, "season");

    // Render team accuracy chart
    renderTeamAccuracyChart(teamStats);

    showHistoryLoading(false);
}

buildAccuracy();
</script>

</body>
</html>
