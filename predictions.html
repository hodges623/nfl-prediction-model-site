<!DOCTYPE html>
<html>
<head>
    <title>Modeled NFL Predictions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Navigation -->
    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Modeled NFL Predictions</h1>

    <div style="text-align: center;">
        <label for="seasonSelect" style="font-weight: bold;">Select Season:</label>
        <select id="seasonSelect" style="margin-left: 10px;"></select>

        <label for="weekSelect" style="margin-left: 20px; font-weight: bold;">Select Week:</label>
        <select id="weekSelect" style="margin-left: 10px;"></select>
    </div>

    <!-- Loading indicator -->
    <div id="predictionsLoading" class="loading hidden">
        <div class="loader-spinner"></div>
        <div>Loading predictions...</div>
    </div>

    <div id="predictionTable"></div>

</div>

<script>
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

function showPredictionsLoading(show) {
    const el = document.getElementById("predictionsLoading");
    if (show) el.classList.remove("hidden");
    else el.classList.add("hidden");
}

function populateSeasonDropdown(manifest) {
    const seasons = [...new Set(manifest.predictions_csv.map(item => Number(item.season)))].sort((a,b) => a - b);
    const seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = "";

    seasons.forEach(season => {
        const opt = document.createElement("option");
        opt.value = season;
        opt.textContent = season;
        seasonSelect.appendChild(opt);
    });
}

function populateWeekDropdown(manifest, season) {
    const weekSelect = document.getElementById("weekSelect");
    weekSelect.innerHTML = "";

    const weeks = manifest.predictions_csv
        .filter(item => Number(item.season) === Number(season))
        .map(item => Number(item.week))
        .sort((a, b) => a - b);

    weeks.forEach(week => {
        const opt = document.createElement("option");
        opt.value = week;
        opt.textContent = `Week ${week}`;
        weekSelect.appendChild(opt);
    });
}

function getLatestSeason(manifest) {
    return Math.max(...manifest.predictions_csv.map(item => Number(item.season)));
}

function getLatestWeek(manifest, season) {
    return Math.max(
        ...manifest.predictions_csv
            .filter(item => Number(item.season) === Number(season))
            .map(item => Number(item.week))
    );
}

async function loadCSV(path) {
    const res = await fetch(path);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return { headers, rows };
}

function renderPredictionTable(csvData) {
    const container = document.getElementById("predictionTable");
    container.innerHTML = "";

    if (!csvData || csvData.rows.length === 0) {
        container.innerHTML = "<p>No prediction data available for this week.</p>";
        return;
    }

    let html = "<table><thead><tr>";
    csvData.headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr></thead><tbody>";

    csvData.rows.forEach(row => {
        html += "<tr>";
        row.forEach(cell => html += `<td>${cell}</td>`);
        html += "</tr>";
    });

    html += "</tbody></table>";

    // NEW: Wrap table in centering container
    container.innerHTML = `<div class="prediction-wrapper">${html}</div>`;
}

async function loadPrediction(manifest, season, week) {
    showPredictionsLoading(true);

    const entry = manifest.predictions_csv.find(
        p => Number(p.season) === Number(season) && Number(p.week) === Number(week)
    );

    if (!entry) {
        document.getElementById("predictionTable").innerHTML =
            "<p>No prediction file found for this season/week.</p>";
        showPredictionsLoading(false);
        return;
    }

    try {
        const csvData = await loadCSV(`data/${entry.file}`);
        renderPredictionTable(csvData);
    } catch {
        document.getElementById("predictionTable").innerHTML =
            "<p>Error loading prediction data.</p>";
    } finally {
        showPredictionsLoading(false);
    }
}

async function init() {
    showPredictionsLoading(true);
    const manifest = await loadManifest();

    populateSeasonDropdown(manifest);

    const seasonSelect = document.getElementById("seasonSelect");
    const weekSelect = document.getElementById("weekSelect");

    const latestSeason = getLatestSeason(manifest);
    seasonSelect.value = latestSeason;

    populateWeekDropdown(manifest, latestSeason);
    const latestWeek = getLatestWeek(manifest, latestSeason);
    weekSelect.value = latestWeek;

    seasonSelect.addEventListener("change", () => {
        populateWeekDropdown(manifest, seasonSelect.value);
        const latestWeekForSeason = getLatestWeek(manifest, seasonSelect.value);
        weekSelect.value = latestWeekForSeason;
        loadPrediction(manifest, seasonSelect.value, weekSelect.value);
    });

    weekSelect.addEventListener("change", () => {
        loadPrediction(manifest, seasonSelect.value, weekSelect.value);
    });

    await loadPrediction(manifest, latestSeason, latestWeek);
}

init();
</script>

</body>
</html>
