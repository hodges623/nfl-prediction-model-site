<!DOCTYPE html>
<html>
<head>
    <title>Modeled NFL Predictions</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* --- CARD VIEW STYLES --- */
        .view-toggle {
            text-align: center;
            margin: 20px 0;
        }
        .toggle-btn {
            padding: 8px 16px;
            margin: 0 6px;
            border-radius: 6px;
            border: 1px solid #4da3ff;
            background: #1f2933;
            color: #e5e7eb;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .toggle-btn.active {
            background: #4da3ff;
            color: #000;
            font-weight: bold;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 16px;
        }
        .game-card {
            background: #1f2933;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.35);
            border: 1px solid #3b4a5a;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .team-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .predicted-winner-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            background: rgba(52,211,153,0.15);
            border: 1px solid rgba(52,211,153,0.7);
            color: #bbf7d0;
        }

        .game-card-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        .game-card-label {
            color: #9ca3af;
        }
        .game-card-value {
            font-weight: 500;
        }

        .edge-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            margin-left: 6px;
        }
        .edge-with {
            background: rgba(52,211,153,0.15);
            border: 1px solid rgba(52,211,153,0.7);
            color: #bbf7d0;
        }
        .edge-against {
            background: rgba(248,113,113,0.15);
            border: 1px solid rgba(248,113,113,0.7);
            color: #fecaca;
        }

        /* --- TABLE VIEW STYLES --- */
        #tableViewWrapper {
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            padding: 8px 10px;
            border-bottom: 1px solid #3b4a5a;
        }
        th {
            background: #111827;
            text-align: left;
        }
        .predicted-winner-cell {
            font-weight: bold;
            background: rgba(52,211,153,0.15);
        }
    </style>
</head>

<body>

<div class="container">

    <div style="margin-bottom: 20px;">
        <a href="index.html" style="font-size: 1.1rem; text-decoration: none;">
            ← Back to Main Page
        </a>
    </div>

    <h1>Modeled NFL Predictions</h1>

    <div style="text-align: center;">
        <label for="seasonSelect" style="font-weight: bold;">Select Season:</label>
        <select id="seasonSelect" style="margin-left: 10px;"></select>

        <label for="weekSelect" style="margin-left: 20px; font-weight: bold;">Select Week:</label>
        <select id="weekSelect" style="margin-left: 10px;"></select>
    </div>

    <div class="view-toggle">
        <button id="cardViewBtn" class="toggle-btn active">Card View</button>
        <button id="tableViewBtn" class="toggle-btn">Table View</button>
    </div>

    <div id="predictionsLoading" class="loading hidden">
        <div class="loader-spinner"></div>
        <div>Loading predictions...</div>
    </div>

    <div id="summaryBox" class="summary-box hidden"></div>

    <div id="cardViewWrapper"></div>

    <div id="tableViewWrapper" class="hidden"></div>

    <div id="downloadContainer" style="text-align: right; margin-top: 10px;"></div>

</div>

<script>
async function loadManifest() {
    const res = await fetch("html/manifest.json");
    return await res.json();
}

function showPredictionsLoading(show) {
    const el = document.getElementById("predictionsLoading");
    if (show) el.classList.remove("hidden");
    else el.classList.add("hidden");
}

function populateSeasonDropdown(manifest) {
    const seasons = [...new Set(manifest.predictions_csv.map(item => Number(item.season)))].sort((a,b) => a - b);
    const seasonSelect = document.getElementById("seasonSelect");
    seasonSelect.innerHTML = "";

    seasons.forEach(season => {
        const opt = document.createElement("option");
        opt.value = season;
        opt.textContent = season;
        seasonSelect.appendChild(opt);
    });
}

function populateWeekDropdown(manifest, season) {
    const weekSelect = document.getElementById("weekSelect");
    weekSelect.innerHTML = "";

    const weeks = manifest.predictions_csv
        .filter(item => Number(item.season) === Number(season))
        .map(item => Number(item.week))
        .sort((a, b) => a - b);

    weeks.forEach(week => {
        const opt = document.createElement("option");
        opt.value = week;
        opt.textContent = `Week ${week}`;
        weekSelect.appendChild(opt);
    });
}

function getLatestSeason(manifest) {
    return Math.max(...manifest.predictions_csv.map(item => Number(item.season)));
}

function getLatestWeek(manifest, season) {
    return Math.max(
        ...manifest.predictions_csv
            .filter(item => Number(item.season) === Number(season))
            .map(item => Number(item.week))
    );
}

async function loadCSV(path) {
    const res = await fetch(path);
    const text = await res.text();
    const rows = text.trim().split("\n").map(r => r.split(","));
    const headers = rows.shift();
    return rows.map(r => Object.fromEntries(headers.map((h,i)=>[h,r[i]])));
}

function parseProb(val) {
    let p = parseFloat(val);
    if (isNaN(p)) return null;
    if (p > 1) p = p / 100;
    return p;
}

function formatPercent(prob) {
    if (prob == null || isNaN(prob)) return "";
    return (prob * 100).toFixed(1) + "%";
}

function normalizeRow(row) {
    if (row["team_abbr"]) {
        row["Home Team"] = row["team_abbr"];
        row["Away Team"] = row["opponent_abbr"];
        row["Predicted Winner"] = row["predicted_winner"];
        row["Win Probability"] = row["winner_probability"];

        delete row["team_abbr"];
        delete row["opponent_abbr"];
        delete row["predicted_winner"];
        delete row["winner_probability"];
        delete row["season"];
        delete row["week"];
    }
    return row;
}

function buildSummary(rows) {
    if (!rows || rows.length === 0) return null;

    const mostConf = {prob: -1};
    const closest = {dist: 999};
    let biggestDev = null;

    rows.forEach(r => {
        const prob = parseProb(r["Win Probability"]);
        if (prob == null) return;

        const home = r["Home Team"];
        const away = r["Away Team"];
        const pred = r["Predicted Winner"];

        if (prob > mostConf.prob) {
            mostConf.prob = prob;
            mostConf.home = home;
            mostConf.away = away;
            mostConf.pred = pred;
        }

        const dist = Math.abs(prob - 0.5);
        if (dist < closest.dist) {
            closest.dist = dist;
            closest.prob = prob;
            closest.home = home;
            closest.away = away;
            closest.pred = pred;
        }

        if (r["Win Spread"] && r["Book Spread"]) {
            const modelSpread = parseFloat(r["Win Spread"]);
            const book = parseFloat(r["Book Spread"]);
            if (!isNaN(modelSpread) && !isNaN(book)) {
                const dev = Math.abs(modelSpread - book);
                if (!biggestDev || dev > biggestDev.dev) {
                    biggestDev = {home, away, modelSpread, book, dev};
                }
            }
        }
    });

    return {mostConf, closest, biggestDev};
}

function renderSummaryBox(summary) {
    const box = document.getElementById("summaryBox");

    if (!summary) {
        box.classList.add("hidden");
        return;
    }

    const {mostConf, closest, biggestDev} = summary;

    let html = "<h2>Week Summary</h2>";

    html += `<div class="summary-item"><strong>Most Confident Matchup:</strong> ${mostConf.home} vs ${mostConf.away} — ${formatPercent(mostConf.prob)} (Predicted: ${mostConf.pred})</div>`;
    html += `<div class="summary-item"><strong>Closest Matchup:</strong> ${closest.home} vs ${closest.away} — ${formatPercent(closest.prob)} (Predicted: ${closest.pred})</div>`;

    if (biggestDev) {
        html += `<div class="summary-item"><strong>Biggest Deviation from Book Spread:</strong> ${biggestDev.home} vs ${biggestDev.away} — Win Spread: ${biggestDev.modelSpread.toFixed(1)}, Book Spread: ${biggestDev.book.toFixed(1)} (Δ = ${biggestDev.dev.toFixed(1)})</div>`;
    }

    box.innerHTML = html;
    box.classList.remove("hidden");
}

/* -------------------- CARD VIEW -------------------- */
function renderCardView(rows) {
    const container = document.getElementById("cardViewWrapper");
    container.innerHTML = "";

    if (!rows || rows.length === 0) {
        container.innerHTML = "<p>No prediction data available for this week.</p>";
        document.getElementById("summaryBox").classList.add("hidden");
        return;
    }

    rows = rows.map(normalizeRow);

    rows.sort((a, b) => {
        const pa = parseProb(a["Win Probability"]) ?? -1;
        const pb = parseProb(b["Win Probability"]) ?? -1;
        return pb - pa;
    });

    const summary = buildSummary(rows);
    renderSummaryBox(summary);

    let html = '<div class="cards-grid">';

    rows.forEach(row => {
        const home = row["Home Team"];
        const away = row["Away Team"];
        const pred = row["Predicted Winner"];
        const prob = parseProb(row["Win Probability"]);
        const probText = formatPercent(prob);

        const winSpread = row["Win Spread"] ? parseFloat(row["Win Spread"]) : null;
        const bookSpread = row["Book Spread"] ? parseFloat(row["Book Spread"]) : null;
        const versus = row["Versus Book"] || null;

        const hasSpreads = winSpread !== null && !isNaN(winSpread) && bookSpread !== null && !isNaN(bookSpread);

        let edgeClass = "";
        let edgeLabel = "";
        if (versus) {
            const v = String(versus).toLowerCase();
            if (v.includes("with")) {
                edgeClass = "edge-with";
                edgeLabel = "With Book";
            } else if (v.includes("against")) {
                edgeClass = "edge-against";
                edgeLabel = "Against Book";
            }
        }

        html += `<div class="game-card">`;

        /* NEW INLINE MODEL PICK LAYOUT */
        html += `
            <div style="display:flex; justify-content:center; text-align:center; width:100%; margin-bottom:10px;">
                <div style="display:flex; align-items:center; justify-content:center; gap:28px; width:100%;">

                    <!-- Away Team -->
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <img class="team-logo" src="assets/logos/${away}.png">
                        <div style="margin-top:4px; font-weight:600; display:flex; align-items:center; gap:6px;">
                            ${away}
                            ${pred === away ? `<span class="predicted-winner-tag">Model Pick (${probText})</span>` : ""}
                        </div>
                    </div>

                    <!-- @ Symbol -->
                    <div style="font-size:1.6rem; font-weight:bold; color:#e5e7eb;">@</div>

                    <!-- Home Team -->
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <img class="team-logo" src="assets/logos/${home}.png">
                        <div style="margin-top:4px; font-weight:600; display:flex; align-items:center; gap:6px;">
                            ${home}
                            ${pred === home ? `<span class="predicted-winner-tag">Model Pick (${probText})</span>` : ""}
                        </div>
                    </div>

                </div>
            </div>
        `;

        /* REMOVED WIN PROBABILITY ROW */

        if (hasSpreads) {
            html += `
                <div class="game-card-row">
                    <div class="game-card-label">Model Spread</div>
                    <div class="game-card-value">${winSpread.toFixed(1)}</div>
                </div>
                <div class="game-card-row">
                    <div class="game-card-label">Book Spread</div>
                    <div class="game-card-value">${bookSpread.toFixed(1)}</div>
                </div>
            `;

            if (edgeLabel) {
                html += `
                    <div class="game-card-row">
                        <div class="game-card-label">Edge</div>
                        <div class="game-card-value">
                            <span class="edge-badge ${edgeClass}">${edgeLabel}</span>
                        </div>
                    </div>
                `;
            }
        }

        html += `</div>`;
    });

    html += '</div>';
    container.innerHTML = html;
}

/* -------------------- TABLE VIEW -------------------- */
function renderTableView(rows) {
    const container = document.getElementById("tableViewWrapper");
    container.innerHTML = "";

    if (!rows || rows.length === 0) {
        container.innerHTML = "<p>No prediction data available for this week.</p>";
        return;
    }

    rows = rows.map(normalizeRow);

    const headers = Object.keys(rows[0]).filter(h =>
        !["season", "week"].includes(h.toLowerCase())
    );

    rows.sort((a, b) => {
        const pa = parseProb(a["Win Probability"]) ?? -1;
        const pb = parseProb(b["Win Probability"]) ?? -1;
        return pb - pa;
    });

    let html = "<table><thead><tr>";
    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr></thead><tbody>";

    rows.forEach(row => {
        html += "<tr>";
        headers.forEach(h => {
            let display = row[h];

            if (h === "Win Probability") {
                display = formatPercent(parseProb(display));
            }

            if (h === "Predicted Winner") {
                html += `<td class="predicted-winner-cell">${display}</td>`;
            } else {
                html += `<td>${display}</td>`;
            }
        });
        html += "</tr>";
    });

    html += "</tbody></table>";
    container.innerHTML = html;
}

/* -------------------- DOWNLOAD BUTTON -------------------- */
function renderDownloadButton(filePath) {
    const container = document.getElementById("downloadContainer");
    container.innerHTML = "";

    if (!filePath) return;

    const a = document.createElement("a");
    a.href = filePath;
    a.textContent = "Download CSV";
    a.className = "download-btn";
    a.setAttribute("download", "");
    container.appendChild(a);
}

/* -------------------- LOAD PREDICTION -------------------- */
async function loadPrediction(manifest, season, week) {
    showPredictionsLoading(true);

    const entry = manifest.predictions_csv.find(
        p => Number(p.season) === Number(season) && Number(p.week) === Number(week)
    );

    if (!entry) {
        document.getElementById("cardViewWrapper").innerHTML =
            "<p>No prediction file found for this season/week.</p>";
        document.getElementById("tableViewWrapper").innerHTML = "";
        document.getElementById("summaryBox").classList.add("hidden");
        document.getElementById("downloadContainer").innerHTML = "";
        showPredictionsLoading(false);
        return;
    }

    const path = `data/${entry.file}`;
    renderDownloadButton(path);

    try {
        const csvData = await loadCSV(path);

        renderCardView(csvData);
        renderTableView(csvData);

    } catch {
        document.getElementById("cardViewWrapper").innerHTML =
            "<p>Error loading prediction data.</p>";
        document.getElementById("tableViewWrapper").innerHTML = "";
        document.getElementById("summaryBox").classList.add("hidden");
    } finally {
        showPredictionsLoading(false);
    }
}

/* -------------------- INIT -------------------- */
async function init() {
    showPredictionsLoading(true);
    const manifest = await loadManifest();

    populateSeasonDropdown(manifest);

    const seasonSelect = document.getElementById("seasonSelect");
    const weekSelect = document.getElementById("weekSelect");

    const latestSeason = getLatestSeason(manifest);
    seasonSelect.value = latestSeason;

    populateWeekDropdown(manifest, latestSeason);
    const latestWeek = getLatestWeek(manifest, latestSeason);
    weekSelect.value = latestWeek;

    seasonSelect.addEventListener("change", () => {
        populateWeekDropdown(manifest, seasonSelect.value);
        const latestWeekForSeason = getLatestWeek(manifest, seasonSelect.value);
        weekSelect.value = latestWeekForSeason;
        loadPrediction(manifest, seasonSelect.value, weekSelect.value);
    });

    weekSelect.addEventListener("change", () => {
        loadPrediction(manifest, seasonSelect.value, weekSelect.value);
    });

    /* --- VIEW TOGGLE BUTTONS --- */
    const cardBtn = document.getElementById("cardViewBtn");
    const tableBtn = document.getElementById("tableViewBtn");
    const cardWrapper = document.getElementById("cardViewWrapper");
    const tableWrapper = document.getElementById("tableViewWrapper");

    cardBtn.addEventListener("click", () => {
        cardBtn.classList.add("active");
        tableBtn.classList.remove("active");
        cardWrapper.classList.remove("hidden");
        tableWrapper.classList.add("hidden");
    });

    tableBtn.addEventListener("click", () => {
        tableBtn.classList.add("active");
        cardBtn.classList.remove("active");
        tableWrapper.classList.remove("hidden");
        cardWrapper.classList.add("hidden");
    });

    await loadPrediction(manifest, latestSeason, latestWeek);
}

init();
</script>

</body>
</html>
